<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DME | LISTAGEM</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            const theme = localStorage.getItem('dme_theme') || 'dark';
            if (theme === 'light') document.documentElement.classList.add('light-mode');
        })();
    </script>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-glow: rgba(46, 204, 113, 0.3);
            --bg: #050505;
            --surface: #0f0f0f;
            --surface-light: #1a1a1a;
            --border: #222;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --red: #ff4444;
            --orange: #ffb74d;
        }

        body.light-mode {
            --bg: #fdfdfd;
            --surface: #ffffff;
            --surface-light: #f8f9fa;
            --border: #2ecc71;
            --text-main: #2c3e50;
            --text-dim: #6c757d;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        body:not(.light-mode) {
            background-image: radial-gradient(circle at 50% 50%, #0a1510 0%, #050505 100%);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        /* --- HEADER SECTION --- */
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-family: 'JetBrains Mono';
            color: var(--primary);
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: -1px;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .status-tag {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-family: 'JetBrains Mono';
            margin-top: 5px;
        }

        /* --- CONTROLS --- */
        .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'JetBrains Mono';
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            border-color: var(--primary);
            background: rgba(0, 255, 136, 0.05);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .btn-active-red {
            border-color: var(--red) !important;
            color: var(--red) !important;
        }

        .btn-active-red.active {
            background: var(--red);
            color: white !important;
        }

        /* --- TABS --- */
        .tab-container {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            background: var(--surface);
            padding: 5px;
            border-radius: 8px;
            width: fit-content;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'JetBrains Mono';
            font-size: 0.8rem;
        }

        .tab-btn.active {
            background: var(--surface-light);
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* --- EDITOR AREA --- */
        #editor-area {
            display: none;
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.1);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--surface-light);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            margin-top: 10px;
            border-radius: 8px;
            outline: none;
        }

        /* --- TABLE STYLE --- */
        .table-wrapper {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 18px;
            background: rgba(255, 255, 255, 0.02);
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid var(--border);
            font-weight: 700;
        }

        .patente-header {
            background: linear-gradient(90deg, var(--primary-glow) 0%, transparent 100%);
        }

        .patente-header td {
            padding: 20px;
            color: var(--primary);
            font-family: 'JetBrains Mono';
            font-weight: 700;
            font-size: 1rem;
            border-left: 4px solid var(--primary);
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            vertical-align: middle;
            color: var(--text-main);
        }

        tr:hover td {
            background: rgba(46, 204, 113, 0.03);
        }

        /* --- MODERN BADGES --- */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-online {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.2);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.1);
        }

        .status-offline {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
            border: 1px solid rgba(108, 117, 125, 0.2);
        }

        .badge-perfil {
            background: rgba(46, 204, 113, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            transition: all 0.3s ease;
        }

        .badge-perfil:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .alerta-regular {
            color: var(--text-dim);
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .alerta-rebaixamento {
            background: rgba(255, 183, 77, 0.1);
            color: #ffb74d;
            border: 1px solid #ffb74d;
        }

        .alerta-demissao {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        /* --- MILITAR INFO & AVATAR --- */
        .militar-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent, rgba(0, 0, 0, 0.4));
        }

        .avatar img {
            width: 54px;
            margin-top: -5px;
            z-index: 1;
        }

        /* --- BADGES --- */
        .badge {
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-family: 'JetBrains Mono';
            text-transform: uppercase;
        }

        .status-online {
            color: var(--primary);
            font-weight: bold;
        }

        .status-offline {
            color: var(--text-dim);
        }

        .vis-badge {
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .vis-aberto {
            border-color: var(--primary);
            color: var(--primary);
        }

        .alerta-regular {
            color: #444;
        }

        .alerta-rebaixamento {
            background: rgba(255, 183, 77, 0.1);
            color: var(--orange);
            border: 1px solid var(--orange);
        }

        .alerta-demissao {
            background: rgba(255, 68, 68, 0.1);
            color: var(--red);
            border: 1px solid var(--red);
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.2);
        }

        .grupo-in {
            color: var(--primary);
            font-weight: bold;
        }

        .grupo-out {
            color: var(--red);
            font-weight: bold;
        }

        /* --- FILTERS --- */
        .filtro-ativo .status-regular,
        .filtro-ativo .patente-header:not(.has-irregular) {
            display: none;
        }

        .filtro-ativo .has-irregular,
        .filtro-ativo .fora-do-grupo-demissao {
            display: table-row !important;
        }

        /* HAMBURGER & SIDEBAR CSS */
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .hamburger:hover {
            background: var(--hover-bg);
        }

        .hamburger span {
            width: 24px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: var(--bg);
            border-right: 1px solid var(--border);
            z-index: 3000;
            transition: left 0.3s ease;
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'JetBrains Mono';
        }

        .sidebar-close {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 1.5rem;
            color: var(--text-dim);
        }

        .sidebar-close:hover {
            background: var(--surface-light);
            color: var(--primary);
        }

        .sidebar-menu {
            padding: 20px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: 'JetBrains Mono';
        }

        .sidebar-item:hover {
            background: var(--surface-light);
            color: var(--primary);
            transform: translateX(5px);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .navbar {
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 35px;
            height: 35px;
            background: url('https://www.habbo.com.br/habbo-imaging/badge/b09134s43114s41194f1035061689.gif') no-repeat center;
            background-size: contain;
            filter: drop-shadow(0 0 5px var(--primary-glow));
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            font-family: 'JetBrains Mono';
            color: var(--text-main);
        }

        .logo-text span {
            color: var(--primary);
        }

        .user-profile {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            background: var(--surface-light);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .user-profile:hover {
            border-color: var(--primary);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            transition: all 0.3s ease;
        }

        .user-avatar img {
            width: auto;
            height: 140%;
            object-fit: contain;
            transform: scale(1.1) translateY(3px);
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 220px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .user-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .dropdown-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-avatar {
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .dropdown-avatar img {
            width: auto;
            height: 140%;
            object-fit: contain;
            transform: translateY(5px);
        }

        .dropdown-user-details h4 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .dropdown-user-details p {
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .dropdown-menu {
            padding: 8px;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: var(--surface-light);
            color: var(--primary);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0;
        }


        .btn-logout {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-logout:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* Responsive Sidebar Logic */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>

    <script>
        // Auth Guard
        const username = localStorage.getItem('dme_username');
        if (!username) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('dme_username');
            window.location.href = 'login.html';
        }

        // Theme Management
        function applyTheme(theme) {
            const body = document.body;
            const themeText = document.getElementById('themeText');

            if (theme === 'light') {
                body.classList.add('light-mode');
                if (themeText) themeText.textContent = 'Modo Escuro';
            } else {
                body.classList.remove('light-mode');
                if (themeText) themeText.textContent = 'Modo Claro';
            }
        }

        function toggleTheme() {
            const currentTheme = localStorage.getItem('dme_theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('dme_theme', newTheme);
            applyTheme(newTheme);
        }

        // Initialize UI
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('dme_theme') || 'dark';
            applyTheme(savedTheme);

            document.getElementById('navUserName').textContent = username;
            document.getElementById('dropdownName').textContent = username;

            const avatarUrl = `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${username}&headonly=1&size=m&gesture=std&head_direction=2`;
            const dropdownAvatarUrl = `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${username}&size=m&direction=2&head_direction=2&gesture=std`;
            document.getElementById('navUserImage').src = avatarUrl;
            document.getElementById('dropdownUserImage').src = dropdownAvatarUrl;

            // Check Admin for Panel link
            const admins = JSON.parse(localStorage.getItem('dme_admins')) || ["Xandelicado", "rafacv", "Ronaldo"];
            if (admins.includes(username)) {
                document.getElementById('dropdownPainel').style.display = 'flex';
                document.getElementById('dropdownDivider').style.display = 'block';
            }

            // Dropdown Toggle
            const userProfileBtn = document.getElementById('userProfileBtn');
            const userDropdown = document.getElementById('userDropdown');

            if (userProfileBtn) {
                userProfileBtn.onclick = (e) => {
                    e.stopPropagation();
                    userDropdown.classList.toggle('active');
                };
            }

            document.addEventListener('click', () => {
                if (userDropdown) userDropdown.classList.remove('active');
            });
        });

        const proxy = "https://corsproxy.io/?";
        let corpoAtivo = 'militar';
        let apenasIrregulares = false;
        const MAX_CONCURRENCY = 2;
        const BATCH_DELAY_MS = 300;
        const TARGET_GROUP_ID = "g-hhbr-daf72072dd8d80ed3db6e1dcb8412403";

        async function fetchWithRetries(url, options = {}, retries = 4, baseDelay = 500) {
            for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                    const resp = await fetch(url, options);
                    if (resp.status === 429) {
                        const ra = resp.headers.get('Retry-After');
                        const wait = ra ? parseInt(ra, 10) * 1000 : baseDelay * Math.pow(2, attempt);
                        if (attempt === retries) throw new Error('Too Many Requests');
                        await new Promise(r => setTimeout(r, wait));
                        continue;
                    }
                    return resp;
                } catch (err) {
                    if (attempt === retries) throw err;
                    const wait = baseDelay * Math.pow(2, attempt);
                    await new Promise(r => setTimeout(r, wait));
                }
            }
        }

        const GROUPS_CACHE = new Map();
        try { const _cached = JSON.parse(sessionStorage.getItem('dme_groups_cache') || '{}'); Object.keys(_cached).forEach(k => GROUPS_CACHE.set(k, _cached[k])); } catch (e) { }
        const USER_CACHE = new Map();
        try { const _uc = JSON.parse(sessionStorage.getItem('dme_users_cache') || '{}'); Object.keys(_uc).forEach(k => USER_CACHE.set(k, _uc[k])); } catch (e) { }

        let dadosMilitar = JSON.parse(localStorage.getItem('dme_militar')) || [];
        let dadosEmpresarial = JSON.parse(localStorage.getItem('dme_empresarial')) || [];

        const listaOficiais = ["Comandante-Geral", "Comandante", "Subcomandante", "Marechal", "General", "Coronel", "Tenente-Coronel", "Major", "Capitão", "Tenente"];

        // Mapa de hierarquia para ordenação (Maior valor = Maior patente)
        const hierarquiaMilitar = {
            "Comandante-Geral": 100, "Comandante": 99, "Subcomandante": 98, "Marechal": 97,
            "General": 96, "Coronel": 95, "Tenente-Coronel": 94, "Major": 93, "Capitão": 92, "Tenente": 91,
            "Aspirante a Oficial": 90, "Subtenente": 80, "Sargento": 70, "Cabo": 60, "Soldado": 50, "Recruta": 40
        };

        const hierarquiaEmpresarial = {
            "Presidente": 100, "Vice-Presidente": 99, "Ministro": 98, "Comissário": 97, "Delegado": 96,
            "Executivo": 95, "Diretor": 94, "Coordenador": 93, "Supervisor": 92, "Escrivão": 91,
            "Analista": 90, "Inspetor": 80, "Sócio": 70, "Agente": 60
        };

        function obterValorPatente(patente, tipo) {
            const mapa = tipo === 'militar' ? hierarquiaMilitar : hierarquiaEmpresarial;
            // Tenta encontrar a patente no mapa (ignora case e espaços extras)
            const chave = Object.keys(mapa).find(key => key.toLowerCase() === patente.trim().toLowerCase());
            return chave ? mapa[chave] : 0; // Se não encontrar, retorna 0 (fim da lista)
        }

        function toggleFiltro() {
            apenasIrregulares = !apenasIrregulares;
            const btn = document.getElementById('btn-filtro');
            const tabela = document.getElementById('tabela-principal');
            if (apenasIrregulares) {
                btn.classList.add('active'); tabela.classList.add('filtro-ativo'); btn.innerText = "VERIFICAR TODOS";
            } else {
                btn.classList.remove('active'); tabela.classList.remove('filtro-ativo'); btn.innerText = "ANALISAR IRREGULARES";
            }
        }

        function toggleEditor() {
            const area = document.getElementById('editor-area');
            area.style.display = area.style.display === 'block' ? 'none' : 'block';
        }

        function processarTexto(texto) {
            const linhas = texto.split('\n');
            const resultado = [];
            let patenteAtual = "Sem Patente";
            linhas.forEach(linha => {
                const l = linha.trim();
                if (!l) return;
                const ehNickComplicado = /[\d]/.test(l) || l.includes('-=') || l.includes('=-');
                const ehCargo = (l.length < 30 && !l.includes('[') && !l.includes('(') && !ehNickComplicado);
                if (ehCargo) { patenteAtual = l.replace('– ', '').replace('-', '').trim(); }
                else {
                    const nick = l.split(' ')[0];
                    if (nick) resultado.push({ nick: nick, patente: patenteAtual });
                }
            });
            return resultado;
        }

        function salvarListas() {
            const m = document.getElementById('input-militar').value;
            const e = document.getElementById('input-empresarial').value;
            if (m) { dadosMilitar = processarTexto(m); localStorage.setItem('dme_militar', JSON.stringify(dadosMilitar)); }
            if (e) { dadosEmpresarial = processarTexto(e); localStorage.setItem('dme_empresarial', JSON.stringify(dadosEmpresarial)); }
            location.reload();
        }

        function mudarCorpo(tipo) {
            corpoAtivo = tipo;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tipo).classList.add('active');
            renderizarTabela();
        }

        async function consultarGrupos(nick, userId) {
            const gCell = document.getElementById(`grupos-${nick}`);
            const aCell = document.getElementById(`alerta-${nick}`);
            if (!gCell) return;
            try {
                const urlGrupos = `https://www.habbo.com.br/api/public/users/${userId}/groups?v=${Date.now()}`;
                let data = GROUPS_CACHE.get(String(userId));
                if (!data) {
                    const res = await fetchWithRetries(proxy + encodeURIComponent(urlGrupos));
                    data = await res.json();
                    try { GROUPS_CACHE.set(String(userId), data); sessionStorage.setItem('dme_groups_cache', JSON.stringify(Object.fromEntries(GROUPS_CACHE))); } catch (e) { }
                }

                const estaNoGrupo = data && data.length > 0 && data.some(grupo => String(grupo.id) === TARGET_GROUP_ID);

                if (estaNoGrupo) {
                    gCell.innerHTML = '<span class="grupo-in">DENTRO DO GRUPO</span>';
                } else {
                    gCell.innerHTML = '<span class="grupo-out">FORA DO GRUPO</span>';
                    if (aCell) aCell.innerHTML = `<span class="badge alerta-demissao">DESLIGAMENTO</span>`;
                    const row = document.getElementById(`row-${nick}`);
                    if (row) {
                        row.classList.add('fora-do-grupo-demissao');
                        const headerId = row.getAttribute('data-header');
                        if (headerId) document.getElementById(headerId)?.classList.add('has-irregular');
                    }
                }
            } catch (e) {
                gCell.innerHTML = '<span style="color:red">ERROR</span>';
            }
        }

        async function consultarHabbo(nick, patente) {
            const row = document.getElementById(`row-${nick}`);
            if (!row) return;
            const sCell = document.getElementById(`status-${nick}`);
            const tCell = document.getElementById(`tempo-${nick}`);
            const vCell = document.getElementById(`visib-${nick}`);
            const aCell = document.getElementById(`alerta-${nick}`);
            const headerId = row.getAttribute('data-header');

            try {
                const userUrl = `https://www.habbo.com.br/api/public/users?name=${encodeURIComponent(nick)}&v=${Date.now()}`;
                let d = USER_CACHE.get(nick);
                if (!d) {
                    const res = await fetchWithRetries(proxy + encodeURIComponent(userUrl));
                    d = await res.json();
                    try { USER_CACHE.set(nick, d); sessionStorage.setItem('dme_users_cache', JSON.stringify(Object.fromEntries(USER_CACHE))); } catch (e) { }
                }

                if (!d || d.error) {
                    sCell.innerHTML = `<span class="status-badge status-offline">N/A</span>`;
                    aCell.innerHTML = `<span class="status-badge alerta-demissao">NÃO LOCALIZADO</span>`;
                    return;
                }

                sCell.innerHTML = d.online ? `<span class="status-badge status-online">ONLINE</span>` : `<span class="status-badge status-offline">OFFLINE</span>`;

                let diasOff = 0;
                if (!d.online && d.lastAccessTime) {
                    const diff = new Date() - new Date(d.lastAccessTime);
                    diasOff = Math.floor(diff / 86400000);
                    tCell.innerHTML = diasOff > 0 ? diasOff + "d" : Math.floor(diff / 3600000) + "h";
                } else {
                    tCell.innerHTML = "---";
                }

                vCell.innerHTML = d.profileVisible ? `<a href="https://www.habbo.com.br/profile/${nick}" target="_blank" class="badge-perfil">ABERTO</a>` : `<span class="alerta-regular">OCULTO</span>`;

                let parecerNegativo = false;

                if (corpoAtivo === 'militar') {
                    const ehOficial = listaOficiais.some(o => patente.toLowerCase() === o.toLowerCase() || patente.toLowerCase().includes(o.toLowerCase()));
                    const ehSoldado = patente.toLowerCase() === 'soldado';

                    if (ehSoldado) {
                        if (diasOff >= 15) { aCell.innerHTML = `<span class="status-badge alerta-demissao">DEMISSÃO</span>`; parecerNegativo = true; }
                        else { aCell.innerHTML = `<span class="alerta-regular">Normal</span>`; row.classList.add('status-regular'); }
                    } else if (ehOficial) {
                        if (diasOff >= 10) { aCell.innerHTML = `<span class="status-badge alerta-demissao">DEMISSÃO</span>`; parecerNegativo = true; }
                        else if (diasOff >= 5) { aCell.innerHTML = `<span class="status-badge alerta-rebaixamento">REBAIXAR</span>`; parecerNegativo = true; }
                        else { aCell.innerHTML = `<span class="alerta-regular">Normal</span>`; row.classList.add('status-regular'); }
                    } else {
                        if (diasOff >= 15) { aCell.innerHTML = `<span class="status-badge alerta-demissao">DEMISSÃO</span>`; parecerNegativo = true; }
                        else if (diasOff >= 8) { aCell.innerHTML = `<span class="status-badge alerta-rebaixamento">REBAIXAR</span>`; parecerNegativo = true; }
                        else { aCell.innerHTML = `<span class="alerta-regular">Normal</span>`; row.classList.add('status-regular'); }
                    }
                } else {
                    if (diasOff >= 60) { aCell.innerHTML = `<span class="status-badge alerta-demissao">DEMISSÃO</span>`; parecerNegativo = true; }
                    else { aCell.innerHTML = `<span class="alerta-regular">Normal</span>`; row.classList.add('status-regular'); }
                }

                if (parecerNegativo) document.getElementById(headerId).classList.add('has-irregular');
                const userId = d.id || d.uniqueId;
                await consultarGrupos(nick, userId);
            } catch (e) { row.classList.add('status-regular'); }
        }

        async function renderizarTabela() {
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = "";

            let lista = corpoAtivo === 'militar' ? [...dadosMilitar] : [...dadosEmpresarial];

            // ORDENAÇÃO: Garante que estão agrupados por patente
            lista.sort((a, b) => {
                const valA = obterValorPatente(a.patente, corpoAtivo);
                const valB = obterValorPatente(b.patente, corpoAtivo);
                return valB - valA; // Ordem decrescente de valor
            });

            let ultimaP = ""; let hCount = 0;

            lista.forEach(m => {
                if (m.patente !== ultimaP) {
                    hCount++; const hId = `header-${hCount}`;
                    corpo.innerHTML += `<tr class="patente-header" id="${hId}"><td colspan="6">${m.patente}</td></tr>`;
                    ultimaP = m.patente;
                }
                const hIdAt = `header-${hCount}`;
                corpo.innerHTML += `<tr id="row-${m.nick}" data-header="${hIdAt}">
                <td><div class="militar-info"><div class="avatar"><img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=${m.nick}&size=m"></div><b>${m.nick}</b></div></td>
                <td id="status-${m.nick}">...</td><td id="tempo-${m.nick}">...</td><td id="visib-${m.nick}">...</td>
                <td id="grupos-${m.nick}">...</td>
                <td id="alerta-${m.nick}">...</td>
            </tr>`;
            });

            for (let i = 0; i < lista.length; i += MAX_CONCURRENCY) {
                const lote = lista.slice(i, i + MAX_CONCURRENCY);
                await Promise.all(lote.map(m => consultarHabbo(m.nick, m.patente)));
                if (BATCH_DELAY_MS > 0) await new Promise(r => setTimeout(r, BATCH_DELAY_MS));
            }
        }

        renderizarTabela();

        // Sidebar Toggle Logic
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const sidebarClose = document.getElementById('sidebarClose');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        }

        if (hamburger) {
            hamburger.addEventListener('click', toggleSidebar);
            sidebarClose.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', toggleSidebar);
        }
    </script>
