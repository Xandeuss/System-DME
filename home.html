<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DME TREINO | Home</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="home.css">
</head>

<body>
    <!-- MOBILE SIDEBAR -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="mobile-sidebar" id="mobileSidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Menu</div>
            <div class="sidebar-close" id="sidebarClose">×</div>
        </div>
        <div class="sidebar-menu">
            <a href="home.html" class="sidebar-item">
                <span style="color:var(--primary-green);">Página Inicial</span>
            </a>
            <a href="listagens.html" class="sidebar-item">
                <span>Listagens</span>
            </a>
            <a href="requerimentos.html" class="sidebar-item">
                <span>Requerimentos</span>
            </a>
            <a href="sabatina.html" class="sidebar-item">
                <span>Sabatina</span>
            </a>
            <a href="consulta_promocao.html" class="sidebar-item">
                <span>Consultar Promoção</span>
            </a>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo-section">
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="logo-icon"></div>
            <div class="logo-text">DME<span>Treino</span></div>
        </div>

        <div class="nav-actions">
            <div class="user-profile" id="userProfileBtn">
                <div class="user-avatar" id="navUserAvatar">
                    <img id="navUserImage" src="" alt="Avatar">
                </div>
                <span class="user-name" id="navUserName">Usuário</span>

                <div class="user-dropdown" id="userDropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-user-info">
                            <div class="dropdown-avatar" id="dropdownAvatar">
                                <img id="dropdownUserImage" src="" alt="Avatar">
                            </div>
                            <div class="dropdown-user-details">
                                <h4 id="dropdownName">Usuário</h4>
                                <p>Militar DME</p>
                            </div>
                        </div>
                    </div>
                    <div class="dropdown-menu">
                        <a href="painel.html" class="dropdown-item" id="dropdownPainel" style="display: none;">
                            <span>Painel</span>
                        </a>
                        <a href="configuracao.html" class="dropdown-item">🔧 Configurações</a>
                        <a onclick="toggleTheme()" class="dropdown-item">
                            <span id="themeText">Modo Claro</span>
                        </a>
                        <div class="dropdown-divider" id="dropdownDivider" style="display: none;"></div>
                        <a onclick="logout()" class="dropdown-item danger">
                            <span>Sair</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <!-- BUSCA RÁPIDA -->
        <section class="search-section">
            <h2 class="search-title">Busca Rápida de Militar</h2>

            <div class="search-input-group">
                <input type="text" class="search-input" id="searchInput"
                    placeholder="Digite o nickname do militar...">
                <button class="btn-search" id="btnSearch">Buscar</button>
            </div>

            <div class="search-result" id="searchResult">
                <div class="result-header">
                    <div class="result-avatar">
                        <img id="resultAvatar" src="" alt="Avatar">
                    </div>
                    <div class="result-info">
                        <h3 id="resultNick">-</h3>
                        <span class="result-badge" id="resultCorpo">-</span>
                    </div>
                </div>
                <div class="result-details">
                    <div class="detail-item">
                        <span class="detail-label">Patente/Cargo</span>
                        <span class="detail-value" id="resultPatente">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Status</span>
                        <span class="detail-value" id="resultStatus">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Corpo</span>
                        <span class="detail-value" id="resultCorpoFull">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Ações</span>
                        <span class="detail-value" id="resultAcoes">-</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- HOME -->
        <section class="welcome-section">
            <div class="welcome-avatar">
                <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=Xandelicado&direction=4&head_direction=4&size=l&action=wav"
                    alt="Avatar" id="userAvatarImg">
            </div>
            <h1 class="welcome-title">
                Bem-vindo, <span id="welcomeUser">Usuário</span>!
            </h1>
            <p class="welcome-subtitle">Sistema de Gestão DME TREINO</p>
        </section>

    </main>

    <!-- JS -->
    <script src="home.js"></script>
</body>
</html>
