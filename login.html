<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DME TREINO | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            const theme = localStorage.getItem('dme_theme') || 'dark';
            if (theme === 'light') document.documentElement.classList.add('light-mode');
        })();
    </script>
    <style>
        :root {
            --primary-dark: #0a1f0f;
            --primary-green: #1a3a24;
            --accent-green: #2ecc71;
            --accent-light: #27ae60;
            --success: #3dff8f;
            --error: #e74c3c;
            --text-white: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #b8c5b8;
            --text-muted: #7a8f7a;
            --surface: #ffffff;
            --border-color: rgba(46, 204, 113, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-green) 50%, #0d2817 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 100px,
                    rgba(46, 204, 113, 0.03) 100px,
                    rgba(46, 204, 113, 0.03) 200px);
            animation: moveLines 20s linear infinite;
            pointer-events: none;
        }

        @keyframes moveLines {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(46, 204, 113, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(39, 174, 96, 0.1) 0%, transparent 40%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .login-container {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--primary-green);
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(46, 204, 113, 0.2);
        }

        .brand-side {
            background: linear-gradient(135deg, #0a1f0f 0%, #1a3a24 50%, #0d2817 100%);
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .brand-side::before {
            content: '';
            position: absolute;
            top: -100%;
            right: -100%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.1) 0%, transparent 50%);
            animation: rotate 25s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .brand-side::after {
            content: 'DME TREINO';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 4rem;
            font-weight: 800;
            color: rgba(46, 204, 113, 0.03);
            letter-spacing: 6px;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
        }

        .brand-header {
            text-align: center;
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .logo-wrapper {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            position: relative;
        }

        .logo-ring {
            position: absolute;
            inset: 0;
            border: 2px solid var(--accent-green);
            border-radius: 50%;
            border-top-color: transparent;
            border-right-color: transparent;
            animation: spinRing 4s linear infinite;
        }

        .logo-ring:nth-child(2) {
            animation: spinRing 6s linear infinite reverse;
            border-color: var(--accent-light);
            border-bottom-color: transparent;
            border-left-color: transparent;
        }

        @keyframes spinRing {
            to {
                transform: rotate(360deg);
            }
        }

        .logo-center {
            position: absolute;
            inset: 8px;
            background: var(--primary-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 20px rgba(46, 204, 113, 0.4),
                inset 0 0 12px rgba(0, 0, 0, 0.5);
        }

        .logo-badge {
            width: 50px;
            height: 50px;
            background-image: url('https://www.habbo.com.br/habbo-imaging/badge/b06134s01114s36044s43014s38114570880883f296e5ddc58f2ff858601e6.gif');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 6px rgba(46, 204, 113, 0.6));
        }

        .brand-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-white);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 6px;
            text-shadow:
                0 0 15px rgba(46, 204, 113, 0.5),
                0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .brand-subtitle {
            font-size: 0.65rem;
            color: var(--accent-green);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .divider-line {
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
            margin: 20px auto;
            position: relative;
            z-index: 2;
        }

        .avatars-section {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            position: relative;
            z-index: 2;
            padding: 0 4px;
        }

        .avatar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-container {
            width: 100%;
            max-width: 120px;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.1) 0%, rgba(39, 174, 96, 0.05) 100%);
            border-radius: 12px;
            border: 2px solid rgba(46, 204, 113, 0.3);
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .avatar-container::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, var(--accent-green), var(--accent-light));
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .avatar-container:hover::before {
            opacity: 1;
        }

        .avatar-container:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
        }

        .avatar-name {
            margin-top: 8px;
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--accent-green);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
        }

        .form-side {
            background: var(--surface);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 18px;
            text-align: center;
        }

        .form-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-description {
            color: var(--text-muted);
            font-size: 0.7rem;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--primary-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .input-container {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 9px 12px;
            background: white;
            border: 2px solid #e0e7e0;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: 'Poppins', sans-serif;
            color: var(--primary-dark);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
            font-size: 0.75rem;
        }

        .form-input:focus {
            border-color: var(--accent-green);
            background: #f9fdf9;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        .form-input.error {
            border-color: var(--error);
            animation: shake 0.3s ease;
        }

        .form-input.success {
            border-color: var(--success);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        .input-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .input-icon.show {
            opacity: 1;
        }

        .input-icon.success {
            color: var(--success);
        }

        .error-text {
            color: var(--error);
            font-size: 0.6rem;
            margin-top: 3px;
            font-weight: 500;
            display: none;
        }

        .error-text.show {
            display: block;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin: 10px 0;
        }

        .checkbox-input {
            width: 14px;
            height: 14px;
            accent-color: var(--accent-green);
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .checkbox-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        .checkbox-label a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-label a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, var(--accent-green) 0%, var(--accent-light) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(46, 204, 113, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        .separator {
            display: flex;
            align-items: center;
            margin: 12px 0;
            color: var(--text-muted);
            font-size: 0.65rem;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d0d7d0, transparent);
        }

        .separator span {
            padding: 0 10px;
            text-transform: uppercase;
        }

        .login-section {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .login-section a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .login-section a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-wrapper {
                grid-template-columns: 1fr;
                max-height: none;
            }

            .brand-side {
                padding: 25px 20px;
            }

            .brand-side::after {
                font-size: 2.5rem;
            }

            .avatars-section {
                gap: 10px;
            }

            .form-side {
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-wrapper">
            <div class="brand-side">
                <div class="brand-header">
                    <div class="logo-wrapper">
                        <div class="logo-ring"></div>
                        <div class="logo-ring"></div>
                        <div class="logo-center">
                            <div class="logo-badge"></div>
                        </div>
                    </div>
                    <h1 class="brand-title">DME TREINO</h1>
                    <p class="brand-subtitle">Sistema de Gestão</p>
                </div>

                <div class="divider-line"></div>

                <div class="avatars-section">
                    <div class="avatar-wrapper">
                        <div class="avatar-container">
                            <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=Xandelicado&direction=4&head_direction=4&size=l&action=wav"
                                alt="Xandelicado" class="avatar-image" loading="lazy">
                        </div>
                        <div class="avatar-name">Xandelicado</div>
                    </div>

                    <div class="avatar-wrapper">
                        <div class="avatar-container">
                            <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=rafacv&direction=3&head_direction=3&size=l"
                                alt="rafacv" class="avatar-image" loading="lazy">
                        </div>
                        <div class="avatar-name">rafacv</div>
                    </div>

                    <div class="avatar-wrapper">
                        <div class="avatar-container">
                            <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=Ronaldo&direction=2&head_direction=2&size=l&action=wav"
                                alt="Ronaldo" class="avatar-image" loading="lazy">
                        </div>
                        <div class="avatar-name">Ronaldo</div>
                    </div>
                </div>
            </div>

            <div class="form-side">
                <div id="loginSection">
                    <div class="form-header">
                        <h2 class="form-title">Acessar conta</h2>
                        <p class="form-description">Bem-vindo de volta, soldado!</p>
                    </div>

                    <form id="loginForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="loginUsername">Nome de usuário</label>
                            <div class="input-container">
                                <input type="text" id="loginUsername" class="form-input"
                                    placeholder="Seu nome de usuário" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="loginPassword">Senha</label>
                            <div class="input-container">
                                <input type="password" id="loginPassword" class="form-input" placeholder="Sua senha"
                                    required>
                            </div>
                        </div>

                        <button type="submit" class="btn-submit" id="loginBtn">
                            <div class="btn-content">
                                <span class="btn-text">Entrar</span>
                                <div class="spinner"></div>
                            </div>
                        </button>
                    </form>

                    <div class="separator">
                        <span>ou</span>
                    </div>

                    <div class="login-section">
                        Novo por aqui? <a onclick="toggleForm('register')">Criar conta</a>
                    </div>
                </div>

                <div id="registerSection" style="display: none;">
                    <div class="form-header">
                        <h2 class="form-title">Criar uma conta</h2>
                        <p class="form-description">O que está esperando? A cidade está pegando fogo.</p>
                    </div>

                    <form id="registerForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="username">Nome de usuário</label>
                            <div class="input-container">
                                <input type="text" id="username" class="form-input" placeholder="Digite seu nome"
                                    required>
                                <span class="input-icon">✓</span>
                            </div>
                            <div class="error-text" id="username-error"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">E-mail</label>
                            <div class="input-container">
                                <input type="email" id="email" class="form-input" placeholder="Digite seu e-mail"
                                    required>
                                <span class="input-icon">✓</span>
                            </div>
                            <div class="error-text" id="email-error"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Senha</label>
                            <div class="input-container">
                                <input type="password" id="password" class="form-input" placeholder="Sua senha"
                                    required>
                                <span class="input-icon">✓</span>
                            </div>
                            <div class="error-text" id="password-error"></div>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="terms" class="checkbox-input" required>
                            <label for="terms" class="checkbox-label">
                                Aceito os <a href="#terms">Termos de Serviço</a>
                            </label>
                        </div>

                        <button type="submit" class="btn-submit" id="submitBtn">
                            <div class="btn-content">
                                <span class="btn-text">Avançar para Verificação</span>
                                <div class="spinner"></div>
                            </div>
                        </button>
                    </form>

                    <div class="separator">
                        <span>ou</span>
                    </div>

                    <div class="login-section">
                        Já possui uma conta? <a onclick="toggleForm('login')">Entrar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="credentials.js"></script>

    <script>
        const appState = {
            formData: { username: '', email: '', password: '', termsAccepted: false },
            isSubmitting: false
        };

        const DOM = {
            usernameInput: document.getElementById('username'),
            emailInput: document.getElementById('email'),
            passwordInput: document.getElementById('password'),
            termsCheckbox: document.getElementById('terms'),
            submitBtn: document.getElementById('submitBtn'),
            registerForm: document.getElementById('registerForm'),
            loginForm: document.getElementById('loginForm'),
            loginBtn: document.getElementById('loginBtn'),
            registerSection: document.getElementById('registerSection'),
            loginSection: document.getElementById('loginSection')
        };

        function toggleForm(form) {
            if (form === 'login') {
                DOM.registerSection.style.display = 'none';
                DOM.loginSection.style.display = 'block';
            } else {
                DOM.registerSection.style.display = 'block';
                DOM.loginSection.style.display = 'none';
            }
        }

        const validationRules = {
            username: (value) => {
                if (!value || value.trim().length < 3) return 'Mínimo 3 caracteres';
                if (!/^[a-zA-Z0-9._-]+$/.test(value)) return 'Caracteres inválidos';
                return null;
            },
            email: (value) => {
                if (!value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return 'E-mail inválido';
                return null;
            },
            password: (value) => {
                if (!value || value.length < 6) return 'Mínimo 6 caracteres';
                return null;
            }
        };

        function validateField(fieldName, value) {
            if (!validationRules[fieldName]) return true;
            const error = validationRules[fieldName](value);
            const input = DOM[fieldName + 'Input'];
            const errorElement = document.getElementById(fieldName + '-error');
            const icon = input.nextElementSibling;

            if (error) {
                input.classList.add('error');
                input.classList.remove('success');
                errorElement.textContent = error;
                errorElement.classList.add('show');
                icon.classList.remove('show');
                return false;
            } else {
                input.classList.remove('error');
                input.classList.add('success');
                errorElement.classList.remove('show');
                icon.classList.add('show');
                icon.classList.add('success');
                return true;
            }
        }

        Object.keys(validationRules).forEach(fieldName => {
            const input = DOM[fieldName + 'Input'];
            input.addEventListener('blur', (e) => {
                if (e.target.value) validateField(fieldName, e.target.value);
            });
            input.addEventListener('input', (e) => {
                appState.formData[fieldName] = e.target.value;
                if (input.classList.contains('error')) validateField(fieldName, e.target.value);
            });
        });

        DOM.termsCheckbox.addEventListener('change', (e) => {
            appState.formData.termsAccepted = e.target.checked;
        });

        // REGISTER LOGIC
        DOM.registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (appState.isSubmitting) return;

            const isValid = Object.keys(validationRules).every(field =>
                validateField(field, appState.formData[field])
            );

            if (!appState.formData.termsAccepted) {
                alert('Aceite os Termos de Serviço.');
                return;
            }

            if (!isValid) return;

            appState.isSubmitting = true;
            DOM.submitBtn.classList.add('loading');
            DOM.submitBtn.disabled = true;

            // Verificar se usuário já existe no banco final
            const users = JSON.parse(localStorage.getItem('dme_users')) || [];
            if (users.some(u => u.username.toLowerCase() === appState.formData.username.toLowerCase())) {
                alert('Este nome de usuário já está em uso.');
                appState.isSubmitting = false;
                DOM.submitBtn.classList.remove('loading');
                DOM.submitBtn.disabled = false;
                return;
            }

            // Salvar temporariamente para verificação
            localStorage.setItem('dme_pending_registration', JSON.stringify({
                username: appState.formData.username,
                email: appState.formData.email,
                password: appState.formData.password
            }));

            // Também salva o username para a página de verificação ler (compatibilidade com lógica atual de dme_username)
            localStorage.setItem('dme_username', appState.formData.username);

            setTimeout(() => {
                window.location.href = 'verificacao.html';
            }, 1000);
        });

        // LOGIN LOGIC
        DOM.loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                alert('Preencha os dados de acesso.');
                return;
            }

            DOM.loginBtn.classList.add('loading');
            DOM.loginBtn.disabled = true;

            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('dme_users')) || [];
                let user = null;

                // Check static credentials file first (credentials.js)
                if (window._DME_CREDENTIALS && Array.isArray(window._DME_CREDENTIALS)) {
                    user = window._DME_CREDENTIALS.find(u =>
                        (u.username || '').toString().toLowerCase() === username.toLowerCase() &&
                        (u.password || '').toString().trim() === password.trim()
                    );
                }

                // Fallback to users saved in localStorage
                if (!user) {
                    user = users.find(u => {
                        const storedUsername = (u.username || '').toString().toLowerCase();
                        const storedPassword = (u.password || '').toString();
                        return storedUsername === username.toLowerCase() && storedPassword.trim() === password.trim();
                    });
                }

                if (user) {
                    const status = user.status || 'ativo';

                    if (status === 'pendente') {
                        alert('Sua conta ainda não foi aprovada por um administrador. Por favor, aguarde.');
                        DOM.loginBtn.classList.remove('loading');
                        DOM.loginBtn.disabled = false;
                        return;
                    }

                    if (status === 'desativado') {
                        alert('Sua conta foi desativada. Entre em contato com um administrador.');
                        DOM.loginBtn.classList.remove('loading');
                        DOM.loginBtn.disabled = false;
                        return;
                    }

                    if (status === 'banido') {
                        alert('Sua conta foi banida por violação das diretrizes.');
                        DOM.loginBtn.classList.remove('loading');
                        DOM.loginBtn.disabled = false;
                        return;
                    }

                    if (status === 'ativo') {
                        localStorage.setItem('dme_username', user.username);
                        window.location.href = 'home.html';
                    }
                } else {
                    alert('Usuário ou senha incorretos.');
                    DOM.loginBtn.classList.remove('loading');
                    DOM.loginBtn.disabled = false;
                }
            }, 1000);
        });

        document.addEventListener('DOMContentLoaded', () => {
            // Theme Management
            const savedTheme = localStorage.getItem('dme_theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
            }

            const avatars = document.querySelectorAll('.avatar-wrapper');
            avatars.forEach((avatar, index) => {
                avatar.style.opacity = '0';
                avatar.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    avatar.style.transition = 'all 0.5s ease';
                    avatar.style.opacity = '1';
                    avatar.style.transform = 'translateY(0)';
                }, 200 + (index * 100));
            });
        });
    </script>
</body>

</html>
