<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DME TREINO | Login</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS do Login -->
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-wrapper">
            <div class="brand-side">
                <div class="brand-header">
                    <div class="logo-wrapper">
                        <div class="logo-ring"></div>
                        <div class="logo-ring"></div>
                        <div class="logo-center">
                            <div class="logo-badge"></div>
                        </div>
                    </div>
                    <h1 class="brand-title">DME TREINO</h1>
                    <p class="brand-subtitle">Sistema de Gestão</p>
                </div>

                <div class="divider-line"></div>

                <div class="avatars-section">
                    <div class="avatar-wrapper">
                        <div class="avatar-container">
                            <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=Xandelicado&direction=4&head_direction=4&size=l&action=wav"
                                alt="Xandelicado" class="avatar-image" loading="lazy">
                        </div>
                        <div class="avatar-name">Xandelicado</div>
                    </div>

                    <div class="avatar-wrapper">
                        <div class="avatar-container">
                            <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=rafacv&direction=3&head_direction=3&size=l"
                                alt="rafacv" class="avatar-image" loading="lazy">
                        </div>
                        <div class="avatar-name">rafacv</div>
                    </div>

                    <div class="avatar-wrapper">
                        <div class="avatar-container">
                            <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=Ronaldo&direction=2&head_direction=2&size=l&action=wav"
                                alt="Ronaldo" class="avatar-image" loading="lazy">
                        </div>
                        <div class="avatar-name">Ronaldo</div>
                    </div>
                </div>
            </div>

            <div class="form-side">
                <!-- LOGIN -->
                <div id="loginSection">
                    <div class="form-header">
                        <h2 class="form-title">Acessar conta</h2>
                        <p class="form-description">Bem-vindo de volta, soldado!</p>
                    </div>

                    <form id="loginForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="loginUsername">Nome de usuário</label>
                            <div class="input-container">
                                <input type="text" id="loginUsername" class="form-input"
                                    placeholder="Seu nome de usuário" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="loginPassword">Senha</label>
                            <div class="input-container">
                                <input type="password" id="loginPassword" class="form-input"
                                    placeholder="Sua senha" required>
                            </div>
                        </div>

                        <button type="submit" class="btn-submit" id="loginBtn">
                            <div class="btn-content">
                                <span class="btn-text">Entrar</span>
                                <div class="spinner"></div>
                            </div>
                        </button>
                    </form>

                    <div class="separator">
                        <span>ou</span>
                    </div>

                    <div class="login-section">
                        Novo por aqui? <a onclick="toggleForm('register')">Criar conta</a>
                    </div>
                </div>

                <!-- REGISTRO -->
                <div id="registerSection" style="display: none;">
                    <div class="form-header">
                        <h2 class="form-title">Criar uma conta</h2>
                        <p class="form-description">O que está esperando? A cidade está pegando fogo.</p>
                    </div>

                    <form id="registerForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="username">Nome de usuário</label>
                            <div class="input-container">
                                <input type="text" id="username" class="form-input"
                                    placeholder="Digite seu nome" required>
                                <span class="input-icon">✓</span>
                            </div>
                            <div class="error-text" id="username-error"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">E-mail</label>
                            <div class="input-container">
                                <input type="email" id="email" class="form-input"
                                    placeholder="Digite seu e-mail" required>
                                <span class="input-icon">✓</span>
                            </div>
                            <div class="error-text" id="email-error"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Senha</label>
                            <div class="input-container">
                                <input type="password" id="password" class="form-input"
                                    placeholder="Sua senha" required>
                                <span class="input-icon">✓</span>
                            </div>
                            <div class="error-text" id="password-error"></div>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="terms" class="checkbox-input" required>
                            <label for="terms" class="checkbox-label">
                                Aceito os <a href="#terms">Termos de Serviço</a>
                            </label>
                        </div>

                        <button type="submit" class="btn-submit" id="submitBtn">
                            <div class="btn-content">
                                <span class="btn-text">Avançar para Verificação</span>
                                <div class="spinner"></div>
                            </div>
                        </button>
                    </form>

                    <div class="separator">
                        <span>ou</span>
                    </div>

                    <div class="login-section">
                        Já possui uma conta? <a onclick="toggleForm('login')">Entrar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ✅ Agora chamando apenas o JS unificado -->
    <script src="login.js"></script>

</body>
</html>
